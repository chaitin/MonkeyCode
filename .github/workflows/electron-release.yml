# 打 tag（如 v1.2.3）后自动构建 Windows / macOS(Intel+Apple Silicon) 桌面包并发布到 GitHub Release。
# 手动运行 workflow 仅上传 Actions Artifact，不创建 Release（便于试打）。

name: Electron Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# 仅写 contents 会把其余权限置为 none，会导致 download-artifact 找不到同 run 上传的产物
permissions:
  contents: write
  actions: write

concurrency:
  group: electron-release-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  electron-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Set package.json version
        shell: bash
        working-directory: frontend
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="0.0.0-ci.${{ github.run_number }}"
          fi
          # electron-builder 要求严格 semver（至少 major.minor.patch 三段）
          if [[ "$V" =~ ^[0-9]+\.[0-9]+$ ]]; then
            V="${V}.0"
          fi
          node -e "const fs=require('fs');const p='package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.version=process.argv[1];fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');" "$V"

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      # 显式 frontend + pwsh：避免 defaults.run 在 windows-latest 上未生效导致在仓库根执行、产物不在 frontend/release
      # 仅在 Windows Runner 上开启 signAndEditExecutable（写入 exe 图标等）
      - name: Build Windows (portable + NSIS)
        working-directory: frontend
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "CWD before build: $(Get-Location)"
          pnpm run electron:ci:win:native
          if (-not (Test-Path -LiteralPath "release")) {
            Write-Error "electron-builder 结束后未找到 ./release（当前应在 frontend 目录）。列出当前目录："
            Get-ChildItem -Force | Format-Table -AutoSize
            exit 1
          }
          Write-Host "release 目录内容:"
          Get-ChildItem -Recurse release | ForEach-Object { $_.FullName }

      - uses: actions/upload-artifact@v4
        with:
          name: electron-windows-x64
          path: |
            frontend/release/*.exe
            frontend/release/*.yml
          if-no-files-found: error

  electron-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Set package.json version
        working-directory: frontend
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="0.0.0-ci.${{ github.run_number }}"
          fi
          if [[ "$V" =~ ^[0-9]+\.[0-9]+$ ]]; then
            V="${V}.0"
          fi
          node -e "const fs=require('fs');const p='package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.version=process.argv[1];fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');" "$V"

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      # 目标格式（dmg / zip）取自 package.json 的 build.mac.target
      - name: Build macOS (arm64 + x64)
        working-directory: frontend
        run: |
          set -euo pipefail
          pwd
          pnpm run electron:ci:mac
          test -d release || (echo "missing frontend/release"; ls -la; exit 1)
          ls -laR release

      - uses: actions/upload-artifact@v4
        with:
          name: electron-macos-universal
          path: |
            frontend/release/*.dmg
            frontend/release/*.zip
            frontend/release/*.yml
          if-no-files-found: error

  publish-release:
    needs: [electron-windows, electron-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: electron-windows-x64
          path: release-assets/windows

      - uses: actions/download-artifact@v4
        with:
          name: electron-macos-universal
          path: release-assets/macos

      - name: List release files
        run: find release-assets -type f -exec ls -lh {} \;

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: MonkeyCode Desktop ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release-assets/windows/*
            release-assets/macos/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
