# 定义 stages
stages:
  - build
  - docker

# 定义变量
variables:
  NODE_VERSION: "20"
  DOCKER_IMAGE_NAME: "chaitin-registry.cn-hangzhou.cr.aliyuncs.com/monkeycode/frontend"

# 缓存 node_modules 和 pnpm 缓存
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - frontend/monkeycode-ai/node_modules/
    - .pnpm-store/

# 构建阶段
build:
  stage: build
  image: node:${NODE_VERSION}
  before_script:
    - corepack enable
    - corepack prepare pnpm@latest --activate
    - cd frontend/monkeycode-ai
    - pnpm install --frozen-lockfile
  script:
    # 生成 sitemap
    - sed -i 's/deb.debian.org/mirrors.aliyun.com/g' /etc/apt/sources.list.d/debian.sources
    - apt-get update && apt-get install -y python3 python3-pip
    - pip3 install requests --break-system-packages -i https://mirrors.aliyun.com/pypi/simple/ --trusted-host mirrors.aliyun.com
    - python3 scripts/generate-sitemap.py
    # 构建项目
    - pnpm run build
  artifacts:
    paths:
      - frontend/monkeycode-ai/dist/
    expire_in: 1 week
  only:
    - main
    - develop
    - merge_requests

# Docker 镜像构建阶段
docker:
  stage: docker
  image: portus.in.chaitin.net/library/docker:buildx
  before_script:
    - cp -r ./frontend/monkeycode-ai/dist ./frontend/docker/dist
    - cd frontend/docker
    - docker login -u "$ALI_CR_USER" -p "$ALI_CR_PASSWORD" chaitin-registry.cn-hangzhou.cr.aliyuncs.com
    - docker buildx create --name builder --use --bootstrap --driver-opt image=portus.in.chaitin.net/library/buildkit:buildx-stable-1
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAG=$CI_COMMIT_TAG
      else
        TAG=$CI_COMMIT_SHORT_SHA
      fi
    - docker buildx build --platform linux/amd64 -t $DOCKER_IMAGE_NAME:$TAG --push .
    - docker buildx build --platform linux/amd64 -t $DOCKER_IMAGE_NAME:latest --push .
  dependencies:
    - build
  only:
    - main
    - develop
  tags:
    - docker